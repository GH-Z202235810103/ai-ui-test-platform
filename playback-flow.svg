<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <style>
    .start-end { fill: #e8f5e9; stroke: #4caf50; stroke-width: 2; }
    .decision { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; }
    .process { fill: #e3f2fd; stroke: #2196f3; stroke-width: 2; }
    .text { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 13px; fill: #333; }
    .label { font-family: 'Microsoft YaHei', Arial, sans-serif; font-size: 11px; fill: #666; }
    .arrow { stroke: #666; stroke-width: 1.5; fill: none; marker-end: url(#arrowhead); }
  </style>

  <!-- A: 开始回放 -->
  <ellipse cx="400" cy="40" rx="60" ry="25" class="start-end" filter="url(#shadow)"/>
  <text x="400" y="45" text-anchor="middle" class="text">开始回放</text>

  <!-- A -> B -->
  <line x1="400" y1="65" x2="400" y2="100" class="arrow"/>

  <!-- B: 判断操作类型 -->
  <polygon points="400,100 480,150 400,200 320,150" class="decision" filter="url(#shadow)"/>
  <text x="400" y="145" text-anchor="middle" class="text">判断操作类型</text>

  <!-- B -> C (导航指令) -->
  <line x1="320" y1="150" x2="200" y2="150" class="arrow"/>
  <text x="260" y="140" class="label">导航指令</text>

  <!-- C: 跳转页面并监听Load事件 -->
  <rect x="70" y="220" width="180" height="40" rx="5" class="process" filter="url(#shadow)"/>
  <text x="160" y="245" text-anchor="middle" class="text">跳转页面并监听Load事件</text>

  <!-- B -> C 连接线 -->
  <path d="M 200 150 L 200 220" class="arrow"/>

  <!-- C -> D -->
  <line x1="160" y1="260" x2="160" y2="300" class="arrow"/>

  <!-- D: 等待页面稳定状态 -->
  <rect x="70" y="300" width="180" height="40" rx="5" class="process" filter="url(#shadow)"/>
  <text x="160" y="325" text-anchor="middle" class="text">等待页面稳定状态</text>

  <!-- D -> E -->
  <line x1="160" y1="340" x2="160" y2="380" class="arrow"/>

  <!-- E: 页面是否稳定 -->
  <polygon points="160,380 230,420 160,460 90,420" class="decision" filter="url(#shadow)"/>
  <text x="160" y="415" text-anchor="middle" class="text">页面是否稳定</text>

  <!-- E -> D (否) -->
  <path d="M 90 420 L 50 420 L 50 320 L 70 320" class="arrow"/>
  <text x="55" y="410" class="label">否</text>

  <!-- E -> F (是) -->
  <line x1="160" y1="460" x2="160" y2="520" class="arrow"/>
  <text x="170" y="490" class="label">是</text>

  <!-- F: 是否有后续步骤 -->
  <polygon points="160,520 230,560 160,600 90,560" class="decision" filter="url(#shadow)"/>
  <text x="160" y="555" text-anchor="middle" class="text">是否有后续步骤</text>

  <!-- F -> B (是) -->
  <path d="M 230 560 L 280 560 L 280 150 L 320 150" class="arrow"/>
  <text x="255" y="550" class="label">是</text>

  <!-- F -> K (否) -->
  <line x1="160" y1="600" x2="160" y2="820" class="arrow"/>
  <text x="170" y="710" class="label">否</text>

  <!-- B -> G (交互指令) -->
  <line x1="480" y1="150" x2="600" y2="150" class="arrow"/>
  <text x="540" y="140" class="label">交互指令</text>

  <!-- G: 采用主策略查找元素 -->
  <rect x="510" y="220" width="180" height="40" rx="5" class="process" filter="url(#shadow)"/>
  <text x="600" y="245" text-anchor="middle" class="text">采用主策略查找元素</text>

  <!-- B -> G 连接线 -->
  <path d="M 600 150 L 600 220" class="arrow"/>

  <!-- G -> H -->
  <line x1="600" y1="260" x2="600" y2="300" class="arrow"/>

  <!-- H: 执行点击或输入操作 -->
  <rect x="510" y="300" width="180" height="40" rx="5" class="process" filter="url(#shadow)"/>
  <text x="600" y="325" text-anchor="middle" class="text">执行点击或输入操作</text>

  <!-- H -> I -->
  <line x1="600" y1="340" x2="600" y2="380" class="arrow"/>

  <!-- I: 操作是否成功 -->
  <polygon points="600,380 670,420 600,460 530,420" class="decision" filter="url(#shadow)"/>
  <text x="600" y="415" text-anchor="middle" class="text">操作是否成功</text>

  <!-- I -> J (否) -->
  <line x1="670" y1="420" x2="720" y2="420" class="arrow"/>
  <text x="695" y="410" class="label">否</text>

  <!-- J: 切换备用策略重试 -->
  <rect x="630" y="480" width="140" height="40" rx="5" class="process" filter="url(#shadow)"/>
  <text x="700" y="505" text-anchor="middle" class="text">切换备用策略重试</text>

  <!-- I -> J 连接线 -->
  <path d="M 720 420 L 720 480" class="arrow"/>

  <!-- J -> G -->
  <path d="M 700 480 L 700 190 L 690 190 L 690 240 L 690 240" class="arrow" style="stroke-dasharray: none;"/>
  <path d="M 700 480 L 700 190 L 600 190 L 600 220" class="arrow"/>

  <!-- I -> F (是) -->
  <path d="M 600 460 L 600 560 L 230 560" class="arrow"/>
  <text x="580" y="490" class="label">是</text>

  <!-- K: 回放结束 -->
  <ellipse cx="160" cy="850" rx="60" ry="25" class="start-end" filter="url(#shadow)"/>
  <text x="160" y="855" text-anchor="middle" class="text">回放结束</text>

</svg>